name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    # Blocking: the tree is ruff- and black-clean. Keep it that way.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Black (check)
        run: black --check .

  typecheck:
    runs-on: ubuntu-latest
    # Blocking: the tree is mypy-clean (`mypy src` passes). Keep it that way.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Mypy
        run: mypy src

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Check CLI entry point
        run: |
          jfuse --help
          jfuse structures

      - name: Run test suite
        run: pytest
